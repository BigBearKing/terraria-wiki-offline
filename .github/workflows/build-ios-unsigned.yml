name: Build Unsigned iOS IPA

on:
  workflow_dispatch:          # 允许手动触发

jobs:
  build-ios:
    runs-on: macos-26        # 推荐使用 macos-26，更匹配 .NET 10 + Xcode 26

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Xcode 26.3
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.3'   # 保持使用 26.3 不变

    - name: Verify Xcode Version
      run: |
        xcode-select -p
        xcodebuild -version
        echo "✅ Xcode version confirmed"

    # 【改动点 1】：将 '10.0.x' 替换为确切的旧版本号（例如 10.0.100）
    # 注：如果 10.0.100 报错找不到，请去你之前成功运行的 Action 日志里，
    # 看看当时 Setup .NET 这一步实际安装的具体版本号是多少，填入此处。
    - name: Setup .NET 10.0 (Pinned Version)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.202'

    # 【改动点 2】：动态生成 global.json
    # 这一步非常关键，它强制项目使用指定的 SDK 版本，防止后续执行 workload install 时
    # 自动去拉取要求 Xcode 26.4 的最新版 iOS workload manifest。
    - name: Create global.json to Lock SDK and Workload
      run: |
        echo '{
          "sdk": {
            "version": "10.0.202"
          }
        }' > global.json
        echo "✅ Created global.json to lock .NET version:"
        cat global.json

    - name: Install MAUI Workloads
      run: dotnet workload install maui --ignore-failed-sources

    - name: Publish iOS App (Unsigned)
      run: |
        dotnet publish Terraria_Wiki/Terraria_Wiki.csproj \
          -f net10.0-ios \
          -c Release \
          -p:RuntimeIdentifier=ios-arm64 \
          -p:CodesignKey="-" \
          -p:CodesignProvision="-" \
          -p:RequireProvisioningProfile=false \
          -p:BuildIpa=true \
          --verbosity:normal

    - name: Package .app to .ipa
      run: |
        # 自动查找生成的 .app（兼容不同输出路径）
        APP_PATH=$(find Terraria_Wiki/bin/Release/net10.0-ios/ios-arm64 -type d -name "*.app" | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "❌ 未找到 .app 文件！"
          ls -R Terraria_Wiki/bin/Release/net10.0-ios/
          exit 1
        fi
        
        echo "✅ Found App: $APP_PATH"
        
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        
        # 打包成 IPA
        zip -qr Terraria_Wiki-Unsigned.ipa Payload
        
        echo "✅ IPA 打包完成：Terraria_Wiki-Unsigned.ipa"

    - name: Upload Unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: Terraria_Wiki-iOS-Unsigned
        path: Terraria_Wiki-Unsigned.ipa
        retention-days: 7
