name: .NET MAUI Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 如果你需要安装特定 Android SDK 版本（可选，MAUI 通常自带）
      # - name: Setup Android SDK
      #   uses: android-actions/setup-android@v3
      #   with:
      #     api-level: 34

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Android APK
        run: |
          dotnet publish -f:net8.0-android -c:Release \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyAlias=QiQikey \
            -p:AndroidSigningKeyPass=123456 \
            -p:AndroidSigningStorePass=123456 \
            -p:AndroidSigningStoreKey=${{ github.workspace }}/keystore.jks \
            -p:AndroidPackageFormat=apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: |
            **/bin/Release/net8.0-android/*-Signed.apk
            **/bin/Release/net8.0-android/*-Signed.aab